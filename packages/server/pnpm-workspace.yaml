packages:
  - "services/*"

allowBuilds:
  bcrypt: true
  bufferutil: true
  esbuild: true
  mediasoup: true
  msgpackr-extract: true
  sharp: true
  unrs-resolver: true
  xxhash-addon: true

nodeLinker: hoisted
blockExoticSubdeps: false

minimumReleaseAgeExclude:
  - "@ragestudio/scylla-odm@0.22.17"

overrides:
  #linebridge: link:../../modules/linebridge/server/build
  "@nats-io/transport-node": "3.4.0"
  "@nats-io/jetstream": "3.4.0"
  "@nats-io/kv": "3.4.0"
